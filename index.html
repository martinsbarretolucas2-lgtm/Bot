<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dollar Ticket | Admin Panel</title>
    <style>
        :root { --primary: #5865F2; --bg: #0f0f13; --card: #1a1a24; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .btn { 
            background: var(--primary); border: none; color: white; padding: 12px 24px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-danger { background: #E74C3C; }
        .status-dot { height: 10px; width: 10px; background: #2ECC71; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">💎 Dollar Ticket Admin</h1>
    
    <div class="grid">
        <div class="card">
            <h3>Status do Sistema</h3>
            <p><span class="status-dot"></span> Bot: <span id="bot-status">Online</span></p>
            <p>Ping: <span id="ping">0</span>ms</p>
        </div>

        <div class="card">
            <h3>Ações Rápidas</h3>
            <button class="btn" onclick="executarAcao('setup')">Enviar Painel de Ticket</button>
            <button class="btn btn-danger" onclick="executarAcao('toggle-mod')">Toggle Auto-Mod</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://bot-ticket-cvbc.onrender.com/api";

        async function executarAcao(tipo) {
            try {
                const res = await fetch(`${API_BASE}/action/${tipo}`, { method: 'POST' });
                const data = await res.json();
                alert(data.message || "Ação executada!");
            } catch (e) {
                alert("Erro ao conectar com o Bot. Verifique se ele está ONLINE.");
            }
        }

        // Atualiza o ping e status a cada 5s
        setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE}/stats`);
                const data = await res.json();
                document.getElementById('ping').innerText = data.ping;
            } catch (e) {}
        }, 5000);
    </script>
</body>
</html>
